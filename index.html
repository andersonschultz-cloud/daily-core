<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Principais Entregas da Semana — Time Core & Crédito" />
  <title>Daily Core & Crédito — Sicredi DevOps</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- BACKGROUND PARTICLES -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--2" aria-hidden="true"></div>

  <!-- HEADER -->
  <header class="site-header" id="top">
    <div class="header-inner">
      <div class="header-badge">
        <i class="fa-solid fa-bolt"></i>
        <span>Coordenação de DevOps · Confederação Sicredi</span>
      </div>

      <h1 class="header-title" id="js-titulo">Principais Entregas da Semana</h1>
      <p class="header-subtitle" id="js-subtitulo">Time Core &amp; Crédito</p>
      <p class="header-desc" id="js-descricao">Resultados, melhorias operacionais, estabilidade e evolução contínua dos ambientes.</p>

      <!-- AVATARES -->
      <div class="header-avatars" id="js-avatares" role="list" aria-label="Membros do time"></div>
    </div>
  </header>

  <!-- TOOLBAR -->
  <div class="toolbar" role="toolbar" aria-label="Ferramentas">
    <div class="toolbar-left">
      <div class="search-wrapper">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="search"
          id="js-search"
          class="search-input"
          placeholder="Pesquisar analista..."
          aria-label="Pesquisar analista"
          autocomplete="off"
        />
      </div>

      <select id="js-sort" class="sort-select" aria-label="Ordenar por">
        <option value="default">Ordenar por...</option>
        <option value="nome">Nome (A–Z)</option>
        <option value="cargo">Cargo</option>
        <option value="entregas">Qtd. de Entregas</option>
        <option value="badge">Métrica Principal</option>
      </select>
    </div>

    <div class="toolbar-right">
      <button id="js-toggle-theme" class="btn btn--ghost" title="Alternar tema" aria-label="Alternar tema claro/escuro">
        <i class="fa-solid fa-moon" id="js-theme-icon"></i>
        <span>Tema</span>
      </button>

      <button id="js-share" class="btn btn--ghost" title="Gerar link compartilhável" aria-label="Gerar link da semana">
        <i class="fa-solid fa-share-nodes"></i>
        <span>Compartilhar</span>
      </button>

      <button id="js-export" class="btn btn--primary" title="Exportar PDF" aria-label="Exportar relatório em PDF">
        <i class="fa-solid fa-file-arrow-down"></i>
        <span>Exportar PDF</span>
      </button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="js-main">
    <div class="cards-grid" id="js-grid" role="list" aria-label="Cards dos analistas">
      <!-- gerado pelo app.js -->
    </div>

    <div class="empty-state hidden" id="js-empty" role="status" aria-live="polite">
      <i class="fa-solid fa-circle-xmark"></i>
      <p>Nenhum analista encontrado.</p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer" id="js-footer">
    <div class="footer-inner">
      <p class="footer-title">
        <i class="fa-solid fa-star"></i>
        Destaques da Semana
      </p>
      <ul class="footer-list" id="js-footer-list">
        <!-- gerado pelo app.js -->
      </ul>
    </div>
  </footer>

  <!-- TOAST -->
  <div class="toast" id="js-toast" role="alert" aria-live="assertive"></div>

  <!-- LOADING -->
  <div class="loading-overlay" id="js-loading" aria-label="Carregando...">
    <div class="loading-spinner"></div>
    <p>Carregando dados...</p>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
