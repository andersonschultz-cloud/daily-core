<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Daily DevOps — Time Core & Crédito · Sicredi" />
  <title>Daily Core & Crédito — Sicredi</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- BG DECORATION -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--2" aria-hidden="true"></div>
  <div class="bg-noise" aria-hidden="true"></div>
  <div class="bg-scanline" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════ -->
  <header class="site-header" id="site-header">
    <div class="header-inner">

      <!-- Logo -->
      <div class="header-logo-wrap">
<img
  src="assets/fotos/logo.png"
  alt="Sicredi"
  class="header-logo"
  id="js-logo"
  onerror="this.style.display='none'"
/>
      </div>

      <!-- Badge institucional -->
      <div class="header-badge">
        <i class="fa-solid fa-circle-nodes"></i>
        <span>Coordenação de DevOps · Confederação Sicredi</span>
      </div>

      <!-- Título editável -->
      <h1
        class="header-title"
        id="js-titulo"
        data-field="titulo"
        contenteditable="false"
        spellcheck="false"
        aria-label="Título principal"
      >Principais Entregas da Semana</h1>

      <!-- Subtítulo editável -->
      <p
        class="header-subtitle"
        id="js-subtitulo"
        data-field="subtitulo"
        contenteditable="false"
        spellcheck="false"
      >Time Core &amp; Crédito</p>

      <!-- Descrição editável -->
      <p
        class="header-desc"
        id="js-descricao"
        data-field="descricao"
        contenteditable="false"
        spellcheck="false"
      >Resultados, melhorias operacionais, estabilidade e evolução contínua dos ambientes.</p>

      <!-- DATA DA DAILY -->
      <div class="header-date-wrap" id="js-date-wrap">
        <div class="header-date-box">
          <i class="fa-solid fa-calendar-days"></i>
          <span class="date-label">Daily DevOps</span>
          <span class="date-sep">·</span>
          <span class="date-label">Data:</span>
          <span
            class="date-value"
            id="js-data-daily"
            data-field="dataDaily"
            contenteditable="false"
            spellcheck="false"
            title="Clique no modo edição para alterar"
          ></span>
        </div>
      </div>

      <!-- Avatares -->
      <div class="header-avatars" id="js-avatares" role="list" aria-label="Membros do time"></div>

    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       TOOLBAR
  ═══════════════════════════════════════════ -->
  <div class="toolbar" role="toolbar" aria-label="Ferramentas" id="js-toolbar">
    <div class="toolbar-left">
      <div class="search-wrapper">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="search"
          id="js-search"
          class="search-input"
          placeholder="Pesquisar analista..."
          aria-label="Pesquisar analista"
          autocomplete="off"
        />
      </div>
      <select id="js-sort" class="sort-select" aria-label="Ordenar por">
        <option value="default">Ordenar por...</option>
        <option value="nome">Nome (A–Z)</option>
        <option value="cargo">Cargo</option>
        <option value="entregas">Qtd. Entregas</option>
      </select>
    </div>

    <div class="toolbar-right">
      <button id="js-toggle-theme" class="btn btn--ghost" title="Alternar tema claro/escuro">
        <i class="fa-solid fa-moon" id="js-theme-icon"></i>
        <span class="btn-label">Tema</span>
      </button>

      <button id="js-toggle-edit" class="btn btn--edit" title="Ativar/desativar modo edição">
        <i class="fa-solid fa-pen-to-square"></i>
        <span class="btn-label">Editar</span>
      </button>

      <button id="js-add-analista" class="btn btn--success edit-only hidden" title="Adicionar analista">
        <i class="fa-solid fa-user-plus"></i>
        <span class="btn-label">Add</span>
      </button>

      <button id="js-save" class="btn btn--primary edit-only hidden" title="Salvar alterações (Ctrl+S)">
        <i class="fa-solid fa-floppy-disk"></i>
        <span class="btn-label">Salvar</span>
      </button>

      <div class="toolbar-divider"></div>

      <button id="js-export-img" class="btn btn--ghost" title="Gerar imagem PNG da página inteira">
        <i class="fa-solid fa-image"></i>
        <span class="btn-label">Imagem</span>
      </button>

      <button id="js-export-json" class="btn btn--ghost" title="Exportar dados JSON">
        <i class="fa-solid fa-file-export"></i>
        <span class="btn-label">Exportar</span>
      </button>

      <label class="btn btn--ghost" title="Importar dados JSON" style="cursor:pointer;">
        <i class="fa-solid fa-file-import"></i>
        <span class="btn-label">Importar</span>
        <input type="file" id="js-import-input" accept=".json" style="display:none;" />
      </label>

      <button id="js-share" class="btn btn--ghost" title="Gerar link compartilhável">
        <i class="fa-solid fa-share-nodes"></i>
        <span class="btn-label">Link</span>
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════════ -->
  <main class="main-content" id="js-main">
    <div class="cards-grid" id="js-grid" role="list" aria-label="Cards dos analistas"></div>
    <div class="empty-state hidden" id="js-empty" role="status" aria-live="polite">
      <i class="fa-solid fa-circle-xmark"></i>
      <p>Nenhum analista encontrado.</p>
    </div>
  </main>

  <!-- ═══════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════ -->
  <footer class="site-footer" id="site-footer">
    <div class="footer-inner">
      <p class="footer-title">
        <i class="fa-solid fa-star"></i>
        Destaques da Semana
      </p>
      <ul class="footer-list" id="js-footer-list"></ul>
    </div>
  </footer>

  <!-- TOAST -->
  <div class="toast" id="js-toast" role="alert" aria-live="assertive" aria-atomic="true"></div>

  <!-- LOADING -->
  <div class="loading-overlay" id="js-loading" aria-label="Carregando dados...">
    <div class="loading-spinner">
      <div class="loading-spinner-inner"></div>
    </div>
    <p class="loading-text">Inicializando<span class="loading-blink">_</span></p>
  </div>

  <!-- MODAL CONFIRMAÇÃO -->
  <div class="modal-overlay hidden" id="js-modal" role="dialog" aria-modal="true" aria-labelledby="js-modal-msg">
    <div class="modal-box">
      <div class="modal-accent-bar"></div>
      <p class="modal-msg" id="js-modal-msg"></p>
      <div class="modal-actions">
        <button class="btn btn--ghost" id="js-modal-cancel">Cancelar</button>
        <button class="btn btn--danger" id="js-modal-confirm">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
